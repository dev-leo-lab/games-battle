<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Battle - Join the Fight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: linear-gradient(135deg, #6A1B9A 0%, #8E24AA 50%, #AB47BC 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px 28px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-line {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 18px;
            text-align: left;
            display: flex;
            gap: 12px;
        }

        .emoji {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 28px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .cta-button {
            background: #fff;
            color: #6A1B9A;
            border: none;
            border-radius: 50px;
            padding: 18px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            background: #f5f5f5;
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .note {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            .title { font-size: 1.5rem; }
            .emoji-line { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Join the Tap Battle</h1>
        
        <div class="emoji-line">
            <span class="emoji">⚔️</span>
            <span>How fast can you tap and beat the world in a battle?</span>
        </div>
        
        <div class="emoji-line">
            <span class="emoji">⏰</span>
            <span>60 seconds of your fingers vs the world.</span>
        </div>
        
        <div class="emoji-line">
            <span class="emoji">👥</span>
            <span>Refer to get free tickets and participate in the battle.</span>
        </div>
        
        <div class="emoji-line">
            <span class="emoji">🏆</span>
            <span>Live leaderboard updates instantly. Top 3 tappers win and earn crypto rewards.</span>
        </div>

        <button class="cta-button" onclick="window.location.href='https://games-battle.lovable.app'">
            Start Tap Battle
        </button>
      
    </div>
</body>
  </html>
